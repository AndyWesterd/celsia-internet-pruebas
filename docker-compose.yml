services:
  db:
    image: postgres:16-alpine
    container_name: ptcrud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ptcrud}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${DB_EXPOSED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ptcrud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: ptcrud-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "${API_PORT:-4000}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME:-ptcrud}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-root}"
      DB_SYNC_ALTER: "${DB_SYNC_ALTER:-true}"
      CLIENT_URL: "${CLIENT_URL:-http://localhost:5173}"
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"

  webapp:
    build:
      context: ./webapp
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: ptcrud-webapp
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres_data:
